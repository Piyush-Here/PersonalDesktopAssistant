<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Desktop Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="layout">

    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-text">Desktop<br>Assistant</span>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Planner</p>
        <div id="llm-badge" class="badge badge-loading">checking…</div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Quick examples</p>
        <ul class="example-list">
          <li><button class="example-btn" data-text="Find my latest report and summarize it">Find &amp; summarize latest report</button></li>
          <li><button class="example-btn" data-text="What is on my screen right now?">What's on my screen?</button></li>
          <li><button class="example-btn" data-text='Copy "C:\temp\notes.txt" to "C:\temp\notes_backup.txt"'>Copy a file</button></li>
          <li><button class="example-btn" data-text='press "ctrl+s"'>Press Ctrl+S</button></li>
          <li><button class="example-btn" data-text='click "Save"'>Click "Save" button</button></li>
          <li><button class="example-btn" data-text='type "Hello World" into "Search"'>Type into a field</button></li>
        </ul>
      </div>

      <div class="sidebar-section sidebar-footer">
        <p class="sidebar-label">Safety</p>
        <p class="safety-note">All state-changing actions pause for confirmation. File delete is blocked.</p>
      </div>
    </aside>

    <!-- ── Main ──────────────────────────────────────────────────── -->
    <main class="main">

      <!-- Chat history -->
      <div class="chat-history" id="chat-history"></div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-card">
          <textarea
            id="text"
            rows="3"
            placeholder="Tell me what to do — e.g. 'Find my budget spreadsheet and open it'"
            autofocus
          ></textarea>
          <div class="input-controls">
            <select id="mode" title="Request mode">
              <option value="act">Act</option>
              <option value="ask">Ask</option>
              <option value="prepare">Prepare</option>
            </select>
            <button id="send-btn" type="button">
              <span id="send-label">Send</span>
              <span id="send-spinner" class="spinner hidden"></span>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
